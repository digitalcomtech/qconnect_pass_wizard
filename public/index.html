<!DOCTYPE html>
<html lang="en">
<head>
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-KZRWXT8XP2"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag() { dataLayer.push(arguments); }
    gtag('js', new Date());

    gtag('config', 'G-KZRWXT8XP2');
  </script>
  <meta charset="UTF-8" />
  <title>PASS Provisioning Console</title>
  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      margin: 0;
      background: #f1f5f9;
      color: #0f172a;
      min-height: 100vh;
    }

    .console-page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .console-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 12px 20px;
      background: #fff;
      border-bottom: 1px solid #cbd5e1;
      flex-wrap: wrap;
    }

    .console-header-left {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .console-header-left h1 {
      margin: 0;
      font-size: 1.15rem;
      font-weight: 600;
      color: #0f172a;
    }

    .console-header-right {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .env-badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      color: #fff;
      background: #64748b;
    }

    .header-user {
      font-size: 0.85rem;
      color: #475569;
    }

    .lang-select {
      padding: 4px 8px;
      font-size: 0.8rem;
      border: 1px solid #cbd5e1;
      border-radius: 4px;
      background: #fff;
      color: #334155;
    }

    .btn-ghost {
      padding: 4px 10px;
      font-size: 0.8rem;
      font-weight: 500;
      color: #475569;
      background: transparent;
      border: 1px solid #cbd5e1;
      border-radius: 4px;
      cursor: pointer;
      margin: 0;
      box-shadow: none;
    }

    .btn-ghost::before {
      display: none;
    }

    .btn-ghost:hover {
      background: #f8fafc;
      color: #0f172a;
      transform: none;
      box-shadow: none;
    }

    .btn-logout:hover {
      border-color: #f87171;
      color: #b91c1c;
    }

    .console-main {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
    }

    .console-main-inner {
      max-width: 920px;
      margin: 0 auto;
    }

    .console-lede {
      margin: 0 0 20px 0;
      font-size: 0.9rem;
      color: #64748b;
    }

    .section,
    .console-section {
      margin-bottom: 20px;
      padding: 16px 18px;
      border: 1px solid #cbd5e1;
      border-radius: 6px;
      background: #fff;
      width: 100%;
      box-sizing: border-box;
    }

    .console-section h2 {
      margin: 0 0 14px 0;
      font-size: 0.95rem;
      font-weight: 600;
      color: #334155;
      text-align: left;
    }

    .console-section h2::after {
      display: none;
    }

    .console-subsection {
      margin-top: 16px;
      padding-top: 16px;
      border-top: 1px solid #e2e8f0;
    }

    .console-subsection h3 {
      margin: 0 0 12px 0;
      font-size: 0.88rem;
      font-weight: 600;
      color: #475569;
    }
    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
      color: #1e293b;
      font-size: 0.95rem;
    }
    input[type="text"],
    input[type="date"],
    input[type="number"],
    select,
    textarea {
      width: 100%;
      padding: 12px 16px;
      margin-bottom: 16px;
      box-sizing: border-box;
      font-size: 1rem;
      border: 2px solid #e2e8f0;
      border-radius: 8px;
      background: #fff;
      transition: all 0.2s ease;
      font-family: inherit;
    }
    input[type="text"]:focus,
    input[type="date"]:focus,
    input[type="number"]:focus,
    select:focus,
    textarea:focus {
      border-color: #862BAB;
      outline: none;
      box-shadow: 0 0 0 3px rgba(134, 43, 171, 0.1);
      transform: translateY(-1px);
    }
    button {
      padding: 8px 16px;
      font-size: 0.9rem;
      font-weight: 500;
      color: #fff;
      background: #334155;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      margin: 8px 8px 0 0;
      font-family: inherit;
    }
    button:hover {
      background: #1e293b;
    }
    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .hidden {
      display: none;
    }
    #clientStatus,
    #vinStatus,
    #installStatus {
      margin-top: 12px;
      font-weight: 600;
      color: #dc2626;
      text-align: center;
      padding: 0;
      border-radius: 8px;
      min-height: 0;
      transition: all 0.3s ease;
    }
    
    #clientStatus:not(:empty),
    #vinStatus:not(:empty),
    #installStatus:not(:empty) {
      padding: 12px;
      min-height: 20px;
      background: rgba(220, 38, 38, 0.1);
    }
    #imeiVerificationStatus {
      padding: 0;
      border-radius: 8px;
      font-size: 0.9rem;
      font-weight: 500;
      min-height: 0;
      border: none;
      transition: all 0.3s ease;
    }
    
    #imeiVerificationStatus:not(:empty) {
      padding: 12px 16px;
      min-height: 24px;
      border: 1px solid #e2e8f0;
    }
    #imeiVerificationStatus span {
      display: block;
    }
    
    .provisioning-preview {
      margin: 20px 0 12px 0;
      padding: 16px 18px;
      border: 2px solid #cbd5e1;
      border-radius: 10px;
      background: #f8fafc;
      font-size: 0.92rem;
      color: #334155;
    }

    .provisioning-preview-title {
      margin: 0 0 8px 0;
      font-size: 1.05rem;
      color: #1e293b;
    }

    .provisioning-preview-note {
      margin: 0 0 14px 0;
      color: #64748b;
      font-size: 0.88rem;
      line-height: 1.45;
    }

    .provisioning-preview-dl {
      display: grid;
      grid-template-columns: 140px 1fr;
      gap: 6px 12px;
      margin: 0 0 14px 0;
    }

    .provisioning-preview-dl dt {
      font-weight: 600;
      color: #475569;
    }

    .provisioning-preview-dl dd {
      margin: 0;
      word-break: break-word;
    }

    .provisioning-preview-section {
      margin-bottom: 12px;
    }

    .provisioning-preview-section ul,
    .provisioning-preview-section ol {
      margin: 6px 0 0 0;
      padding-left: 20px;
      line-height: 1.5;
    }

    .provisioning-preview-warn {
      margin-top: 12px;
      padding: 10px 12px;
      background: #fffbeb;
      border: 1px solid #f59e0b;
      border-radius: 8px;
      color: #92400e;
      font-size: 0.88rem;
    }

    .provisioning-preview-blockers {
      margin-top: 12px;
      padding: 10px 12px;
      background: #fef2f2;
      border: 1px solid #f87171;
      border-radius: 8px;
      color: #991b1b;
      font-size: 0.88rem;
    }

    .provisioning-preview-ready {
      margin: 12px 0 0 0;
      color: #047857;
      font-weight: 600;
    }

    .provisioning-preview-done {
      opacity: 0.85;
    }

    .provisioning-receipt {
      margin: 16px 0 0 0;
      font-size: 0.92rem;
      color: #1e293b;
    }

    .provisioning-receipt-inner {
      border: 2px solid #cbd5e1;
      border-radius: 10px;
      padding: 16px 18px;
      background: #fff;
    }

    .provisioning-receipt-inner.receipt-success {
      border-color: #10b981;
      background: #f0fdf4;
    }

    .provisioning-receipt-inner.receipt-partial {
      border-color: #f59e0b;
      background: #fffbeb;
    }

    .provisioning-receipt-inner.receipt-failed {
      border-color: #ef4444;
      background: #fef2f2;
    }

    .provisioning-receipt-header {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 14px;
    }

    .provisioning-receipt-header h3 {
      margin: 0;
      font-size: 1.05rem;
    }

    .provisioning-receipt-badge {
      font-weight: 700;
      font-size: 0.85rem;
      letter-spacing: 0.04em;
      padding: 4px 10px;
      border-radius: 6px;
      background: rgba(15, 23, 42, 0.08);
    }

    .receipt-success .provisioning-receipt-badge {
      background: #059669;
      color: #fff;
    }

    .receipt-failed .provisioning-receipt-badge {
      background: #dc2626;
      color: #fff;
    }

    .receipt-partial .provisioning-receipt-badge {
      background: #d97706;
      color: #fff;
    }

    .provisioning-receipt-dl {
      display: grid;
      grid-template-columns: 160px 1fr;
      gap: 6px 12px;
      margin: 0 0 14px 0;
    }

    .provisioning-receipt-dl dt {
      font-weight: 600;
      color: #475569;
    }

    .provisioning-receipt-dl dd {
      margin: 0;
      word-break: break-word;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      font-size: 0.88rem;
    }

    .provisioning-receipt-section ul {
      margin: 8px 0 0 0;
      padding-left: 20px;
      line-height: 1.55;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      font-size: 0.86rem;
    }

    .provisioning-receipt-error {
      margin: 10px 0 0 0;
      padding: 10px 12px;
      background: #fee2e2;
      border: 1px solid #f87171;
      border-radius: 8px;
      color: #991b1b;
      word-break: break-word;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      font-size: 0.88rem;
    }

    .provisioning-receipt-warn {
      margin-top: 12px;
      padding: 10px 12px;
      background: #fffbeb;
      border: 1px solid #f59e0b;
      border-radius: 8px;
      color: #92400e;
      font-size: 0.88rem;
    }

    .provisioning-receipt-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 16px;
    }

    .receipt-copy-btn {
      background: linear-gradient(135deg, #475569 0%, #334155 100%);
      box-shadow: 0 4px 12px rgba(51, 65, 85, 0.25);
    }

    .receipt-start-over-btn {
      background: linear-gradient(135deg, #862BAB 0%, #6B21A8 100%);
    }

    .provisioning-action-row {
      display: flex;
      flex-direction: column;
      align-items: stretch;
      gap: 0;
      margin-top: 8px;
    }

    #startInstallBtn {
      align-self: flex-start;
    }

    @media (max-width: 600px) {
      .console-header {
        padding: 10px 12px;
      }
      .console-main {
        padding: 12px;
      }
    }
  </style>
</head>
<body>
  <div class="console-page">
    <header class="console-header">
      <div class="console-header-left">
        <h1 data-i18n="app.title">PASS Provisioning Console</h1>
        <span class="env-badge" id="consoleEnvironment">PROD</span>
      </div>
      <div class="console-header-right">
        <select id="languageSelector" class="lang-select" aria-label="Language">
          <option value="en">EN</option>
          <option value="es">ES</option>
        </select>
        <span class="header-user" id="headerUserLabel"></span>
        <button type="button" class="btn-ghost" id="consoleStartOverBtn">Start over</button>
        <button type="button" class="btn-ghost btn-logout" id="logoutBtn" data-i18n="buttons.logout">Logout</button>
      </div>
    </header>

    <main class="console-main">
      <div class="console-main-inner">
        <p class="console-lede">Search an installation, confirm VIN and devices, then provision in Pegasus.</p>

    <section id="clientSection" class="section console-section">
      <h2 data-i18n="installation.clientSelection">Installation search</h2>
      <form id="clientForm">
        <label for="clientNameInput" data-i18n="installation.clientName">Client name or VIN prefix</label>
        <input
          type="text"
          id="clientNameInput"
          placeholder=""
          autocomplete="off"
        />
        <button type="submit">Search installations</button>
      </form>
      <p id="clientStatus"></p>
    </section>

    <section id="vinSection" class="section console-section">
      <h2 data-i18n="installation.vinSelection">Selected installation / VIN</h2>
      <div id="selectedPersonName" style="margin-bottom:10px; font-weight:600; color:#334155;"></div>
      <label for="vinSelect">VIN</label>
      <select id="vinSelect">
        <option value="">— Select VIN —</option>
      </select>
      <p id="vinStatus"></p>
    </section>

    <section id="deviceSection" class="section console-section">
      <h2 data-i18n="installation.enterImeiSim">Devices &amp; provision</h2>

      <div class="console-subsection">
        <h3>Primary IMEI &amp; SIM</h3>
      <label for="imeiInput" data-i18n="installation.imei">IMEI (primary device)</label>
      <input
        type="text"
        id="imeiInput"
        placeholder="Enter IMEI — searches Pegasus as you type"
        autocomplete="off"
      />
      <div id="imeiVerificationStatus" style="margin-bottom:14px; min-height:1.25rem;" aria-live="polite"></div>
      
      <label for="imeiConfirmInput">Retype IMEI</label>
      <input
        type="text"
        id="imeiConfirmInput"
        placeholder="Retype IMEI"
      />

      <label for="simInput">SIM Card # (Optional)</label>
      <input
        type="text"
        id="simInput"
        placeholder="ICCID (8988 SuperSIM / 8901 Wireless) — optional, live lookup"
        autocomplete="off"
      />
      <div id="simVerificationStatus" style="margin-bottom:14px; min-height:1.25rem;" aria-live="polite"></div>
      
      <label for="simConfirmInput">Retype SIM Card # (Optional)</label>
      <input
        type="text"
        id="simConfirmInput"
        placeholder="Retype SIM Card # (optional)"
      />

      </div>

      <div class="console-subsection">
        <h3>Secondary IMEI &amp; SIM (optional)</h3>
      <label style="display:flex;align-items:center;margin-bottom:8px;">
        <input type="checkbox" id="addSecondaryUnit" style="margin-right:8px;" />
        Add secondary unit
      </label>
      <div id="secondaryUnitFields" class="hidden" style="width:100%;">
        <label for="secondaryImeiInput">Secondary IMEI</label>
        <input
          type="text"
          id="secondaryImeiInput"
          placeholder="Secondary IMEI — searches Pegasus as you type"
          autocomplete="off"
        />
        <div id="secondaryImeiVerificationStatus" style="margin-bottom:14px; min-height:1.25rem;" aria-live="polite"></div>
        
        <label for="secondarySimInput">Secondary SIM Card # (Optional)</label>
        <input
          type="text"
          id="secondarySimInput"
          placeholder="Secondary ICCID — optional, live lookup"
          autocomplete="off"
        />
        <div id="secondarySimVerificationStatus" style="margin-bottom:14px; min-height:1.25rem;" aria-live="polite"></div>
        
        <label for="secondarySimConfirmInput">Retype Secondary SIM Card # (Optional)</label>
        <input
          type="text"
          id="secondarySimConfirmInput"
          placeholder="Retype Secondary SIM Card # (optional)"
        />
      </div>
      </div>

      <div class="console-subsection">
        <h3>Provisioning preview</h3>
      <div class="provisioning-action-row">
        <div id="provisioningPreviewPanel" class="provisioning-preview" aria-live="polite"></div>
        <button id="startInstallBtn" type="button" disabled data-i18n="buttons.startInstallation">Provision in Pegasus</button>
      </div>
      </div>

      <p id="installStatus"></p>

      <div class="console-subsection">
        <h3>Provisioning result</h3>
      <div id="provisioningReceiptPanel" class="provisioning-receipt hidden" aria-live="polite"></div>
      </div>
    </section>
      </div>
    </main>
  </div>

  <!-- i18next Scripts -->
  <script src="./js/i18n-simple.js"></script>
  <script src="./js/activity-tracker.js"></script>
  <script src="./js/wizard-console-mode.js"></script>
  <script src="./js/wizard-auth.js"></script>
  <script src="./js/wizard-api.js"></script>
  <script src="./js/wizard-provisioning-preview.js"></script>
  <script src="./js/wizard-provisioning-receipt.js"></script>
  <script src="./js/wizard-utils.js"></script>
  <script src="./js/installation-run-store.js"></script>
  <script src="./js/installation-run-job.js"></script>
  <script src="./js/wizard-state.js"></script>
  <script src="./js/wizard-dom.js"></script>
  <script src="./js/installation-run-devices.js"></script>
  <script src="./js/installation-run-install.js"></script>
  <script src="./js/installation-run-reporting.js"></script>
  <script src="./js/installation-run-paperwork-confirmation.js"></script>
  <script src="./js/installation-run-resume.js"></script>
  <script src="./js/wizard-workflow-status.js"></script>
  <script src="./js/wizard-nav.js"></script>
  <script src="./js/wizard-search.js"></script>
  <script src="./js/wizard-device-verify.js"></script>
  <script src="./js/wizard-install-submit.js"></script>
  <script src="./js/wizard-resume.js"></script>
  <script src="./js/wizard-app.js"></script>
</body>
</html>
