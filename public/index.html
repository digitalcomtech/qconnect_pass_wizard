<!DOCTYPE html>
<html lang="en">
<head>
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-KZRWXT8XP2"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag() { dataLayer.push(arguments); }
    gtag('js', new Date());

    gtag('config', 'G-KZRWXT8XP2');
  </script>
  <meta charset="UTF-8" />
  <title>PASS Provisioning Console</title>
  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      margin: 0;
      background: #f1f5f9;
      color: #0f172a;
      min-height: 100vh;
    }

    .console-page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .console-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 12px 20px;
      background: #fff;
      border-bottom: 1px solid #cbd5e1;
      flex-wrap: wrap;
    }

    .console-header-left {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .console-header-left h1 {
      margin: 0;
      font-size: 1.15rem;
      font-weight: 600;
      color: #0f172a;
    }

    .header-credential-status {
      font-size: 0.72rem;
      font-weight: 600;
      padding: 3px 8px;
      border-radius: 6px;
      max-width: 420px;
      line-height: 1.3;
    }

    .header-credential-ok {
      background: #dcfce7;
      color: #166534;
    }

    .header-credential-warn {
      background: #fef3c7;
      color: #92400e;
    }

    .console-header-right {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .env-badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      color: #fff;
      background: #64748b;
    }

    .header-user {
      font-size: 0.85rem;
      color: #475569;
    }

    .lang-select {
      padding: 4px 8px;
      font-size: 0.8rem;
      border: 1px solid #cbd5e1;
      border-radius: 4px;
      background: #fff;
      color: #334155;
    }

    .btn-ghost {
      padding: 4px 10px;
      font-size: 0.8rem;
      font-weight: 500;
      color: #475569;
      background: transparent;
      border: 1px solid #cbd5e1;
      border-radius: 4px;
      cursor: pointer;
      margin: 0;
      box-shadow: none;
    }

    .btn-ghost::before {
      display: none;
    }

    .btn-ghost:hover {
      background: #f8fafc;
      color: #0f172a;
      transform: none;
      box-shadow: none;
    }

    .btn-logout:hover {
      border-color: #f87171;
      color: #b91c1c;
    }

    .console-main {
      flex: 1;
      overflow-y: auto;
      padding: 16px 20px 24px;
    }

    .console-main-inner {
      max-width: 1280px;
      margin: 0 auto;
    }

    .console-grid {
      display: grid;
      grid-template-columns: minmax(0, 1.1fr) minmax(0, 0.9fr);
      gap: 16px;
      align-items: start;
    }

    .console-col {
      display: flex;
      flex-direction: column;
      gap: 12px;
      min-width: 0;
    }

    .section,
    .console-card {
      padding: 14px 16px;
      border: 1px solid #cbd5e1;
      border-radius: 4px;
      background: #fff;
      box-sizing: border-box;
    }

    .console-card h2 {
      margin: 0 0 12px 0;
      padding-bottom: 8px;
      border-bottom: 1px solid #e2e8f0;
      font-size: 0.8rem;
      font-weight: 600;
      color: #334155;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .device-panel {
      margin-top: 4px;
    }

    .device-panel + .device-panel {
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid #e2e8f0;
    }

    .device-panel-secondary {
      padding: 10px 12px;
      border: 1px dashed #cbd5e1;
      border-radius: 4px;
      background: #f8fafc;
    }

    .device-panel-title {
      margin: 0 0 10px 0;
      font-size: 0.75rem;
      font-weight: 600;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }

    .device-panel-secondary .device-panel-title {
      color: #94a3b8;
    }

    .field-group {
      margin-bottom: 10px;
    }

    .field-group label {
      margin-bottom: 4px;
    }

    .lookup-status {
      margin: 4px 0 0 0;
      min-height: 1.1rem;
      font-size: 0.8rem;
      line-height: 1.35;
    }

    .lookup-status:empty {
      display: none;
    }

    .search-form-row {
      display: flex;
      gap: 8px;
      align-items: flex-end;
      flex-wrap: wrap;
    }

    .search-form-row .field-group {
      flex: 1;
      min-width: 200px;
      margin-bottom: 0;
    }

    .search-form-row button {
      margin: 0 0 4px 0;
      flex-shrink: 0;
    }

    .selected-person {
      margin: 0 0 10px 0;
      font-size: 0.85rem;
      font-weight: 500;
      color: #475569;
    }

    .selected-person:empty {
      display: none;
    }

    .console-card-actions {
      position: sticky;
      top: 12px;
    }

    .console-card-receipt:not(:has(.provisioning-receipt:not(.hidden))) h2 {
      color: #94a3b8;
    }

    .provision-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid #e2e8f0;
    }

    .provision-actions button {
      flex: 1 1 auto;
      min-width: 140px;
      margin: 0;
      padding: 10px 16px;
    }

    .provision-actions button.secondary-action {
      background: #f1f5f9;
      color: #0f172a;
      border: 1px solid #cbd5e1;
    }

    .provision-actions button.secondary-action:hover:not(:disabled) {
      background: #e2e8f0;
    }

    label {
      display: block;
      margin-bottom: 4px;
      font-weight: 500;
      color: #475569;
      font-size: 0.8rem;
    }

    .field-inline label {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
      font-size: 0.8rem;
      font-weight: 500;
      cursor: pointer;
    }

    .field-inline input[type="checkbox"] {
      width: auto;
      margin: 0;
    }

    input[type="text"],
    input[type="date"],
    input[type="number"],
    select,
    textarea {
      width: 100%;
      padding: 7px 10px;
      margin-bottom: 0;
      box-sizing: border-box;
      font-size: 0.875rem;
      border: 1px solid #cbd5e1;
      border-radius: 3px;
      background: #fff;
      font-family: inherit;
    }

    input[type="text"]:focus,
    input[type="date"]:focus,
    input[type="number"]:focus,
    select:focus,
    textarea:focus {
      border-color: #64748b;
      outline: none;
      box-shadow: 0 0 0 2px rgba(100, 116, 139, 0.15);
    }
    button {
      padding: 8px 16px;
      font-size: 0.9rem;
      font-weight: 500;
      color: #fff;
      background: #334155;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      margin: 8px 8px 0 0;
      font-family: inherit;
    }
    button:hover {
      background: #1e293b;
    }
    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .hidden {
      display: none;
    }
    .status-line {
      margin: 8px 0 0 0;
      font-size: 0.8rem;
      font-weight: 500;
      color: #b91c1c;
      padding: 0;
      min-height: 0;
    }

    .status-line:empty {
      display: none;
    }

    .status-line:not(:empty) {
      padding: 8px 10px;
      background: #fef2f2;
      border: 1px solid #fecaca;
      border-radius: 3px;
    }

    .status-line--loading:not(:empty) {
      color: #475569;
      background: #f1f5f9;
      border-color: #cbd5e1;
    }

    .status-line--success:not(:empty) {
      color: #047857;
      background: #f0fdf4;
      border-color: #bbf7d0;
    }

    .status-line--warn:not(:empty) {
      color: #b45309;
      background: #fffbeb;
      border-color: #fde68a;
    }

    .status-line--error:not(:empty) {
      color: #b91c1c;
      background: #fef2f2;
      border-color: #fecaca;
    }

    .status-line--hint:not(:empty) {
      color: #64748b;
      background: #f8fafc;
      border-color: #e2e8f0;
      font-weight: 400;
    }

    .console-card--disabled {
      opacity: 0.55;
    }

    .console-card--disabled select,
    .console-card--disabled input,
    .console-card--disabled button {
      cursor: not-allowed;
    }

    #vinSection.console-card--disabled {
      pointer-events: none;
    }

    #imeiVerificationStatus:not(:empty),
    #simVerificationStatus:not(:empty),
    #secondaryImeiVerificationStatus:not(:empty),
    #secondarySimVerificationStatus:not(:empty) {
      padding: 6px 8px;
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      border-radius: 3px;
    }

    #imeiVerificationStatus span {
      display: block;
    }

    .provisioning-preview {
      margin: 0;
      padding: 10px 12px;
      border: 1px solid #e2e8f0;
      border-radius: 3px;
      background: #f8fafc;
      font-size: 0.82rem;
      color: #334155;
      line-height: 1.45;
    }

    .provisioning-preview:empty::before {
      content: "Select installation, VIN, and devices to see preview.";
      color: #94a3b8;
      font-style: italic;
    }

    .provisioning-preview-title {
      margin: 0 0 6px 0;
      font-size: 0.88rem;
      color: #1e293b;
    }

    .provisioning-preview-note {
      margin: 0 0 14px 0;
      color: #64748b;
      font-size: 0.88rem;
      line-height: 1.45;
    }

    .provisioning-preview-dl {
      display: grid;
      grid-template-columns: 140px 1fr;
      gap: 6px 12px;
      margin: 0 0 14px 0;
    }

    .provisioning-preview-dl dt {
      font-weight: 600;
      color: #475569;
    }

    .provisioning-preview-dl dd {
      margin: 0;
      word-break: break-word;
    }

    .provisioning-preview-section {
      margin-bottom: 12px;
    }

    .provisioning-preview-section ul,
    .provisioning-preview-section ol {
      margin: 6px 0 0 0;
      padding-left: 20px;
      line-height: 1.5;
    }

    .provisioning-preview-warn {
      margin-top: 12px;
      padding: 10px 12px;
      background: #fffbeb;
      border: 1px solid #f59e0b;
      border-radius: 8px;
      color: #92400e;
      font-size: 0.88rem;
    }

    .provisioning-preview-blockers {
      margin-top: 12px;
      padding: 10px 12px;
      background: #fef2f2;
      border: 1px solid #f87171;
      border-radius: 8px;
      color: #991b1b;
      font-size: 0.88rem;
    }

    .provisioning-preview-ready {
      margin: 12px 0 0 0;
      color: #047857;
      font-weight: 600;
    }

    .provisioning-preview-done {
      opacity: 0.85;
    }

    .server-dry-run-panel {
      margin-top: 14px;
      padding: 12px 14px;
      border: 1px dashed #94a3b8;
      border-radius: 8px;
      background: #f8fafc;
      font-size: 0.9rem;
    }

    .server-dry-run-panel.hidden {
      display: none;
    }

    .server-dry-run-tag {
      margin: 0 0 8px 0;
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: #475569;
    }

    .server-dry-run-summary {
      margin: 0 0 10px 0;
      font-weight: 600;
    }

    .server-dry-run-summary.server-dry-run-ok {
      color: #047857;
    }

    .server-dry-run-summary.server-dry-run-fail {
      color: #b91c1c;
    }

    .server-dry-run-steps,
    .server-dry-run-warn,
    .server-dry-run-err {
      margin: 8px 0 0 1.2rem;
      padding: 0;
    }

    .server-dry-run-warn {
      color: #b45309;
    }

    .server-dry-run-err {
      color: #b91c1c;
    }

    #serverDryRunStatus {
      margin-top: 8px;
      font-size: 0.85rem;
      color: #64748b;
    }

    .provisioning-receipt {
      margin: 16px 0 0 0;
      font-size: 0.92rem;
      color: #1e293b;
    }

    .provisioning-receipt-inner {
      border: 2px solid #cbd5e1;
      border-radius: 10px;
      padding: 16px 18px;
      background: #fff;
    }

    .provisioning-receipt-inner.receipt-success {
      border-color: #10b981;
      background: #f0fdf4;
    }

    .provisioning-receipt-inner.receipt-partial {
      border-color: #f59e0b;
      background: #fffbeb;
    }

    .provisioning-receipt-inner.receipt-failed {
      border-color: #ef4444;
      background: #fef2f2;
    }

    .provisioning-receipt-header {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 14px;
    }

    .provisioning-receipt-header h3 {
      margin: 0;
      font-size: 1.05rem;
    }

    .provisioning-receipt-badge {
      font-weight: 700;
      font-size: 0.85rem;
      letter-spacing: 0.04em;
      padding: 4px 10px;
      border-radius: 6px;
      background: rgba(15, 23, 42, 0.08);
    }

    .receipt-success .provisioning-receipt-badge {
      background: #059669;
      color: #fff;
    }

    .receipt-failed .provisioning-receipt-badge {
      background: #dc2626;
      color: #fff;
    }

    .receipt-partial .provisioning-receipt-badge {
      background: #d97706;
      color: #fff;
    }

    .provisioning-receipt-dl {
      display: grid;
      grid-template-columns: 160px 1fr;
      gap: 6px 12px;
      margin: 0 0 14px 0;
    }

    .provisioning-receipt-dl dt {
      font-weight: 600;
      color: #475569;
    }

    .provisioning-receipt-dl dd {
      margin: 0;
      word-break: break-word;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      font-size: 0.88rem;
    }

    .provisioning-receipt-section ul {
      margin: 8px 0 0 0;
      padding-left: 20px;
      line-height: 1.55;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      font-size: 0.86rem;
    }

    .provisioning-receipt-error {
      margin: 10px 0 0 0;
      padding: 10px 12px;
      background: #fee2e2;
      border: 1px solid #f87171;
      border-radius: 8px;
      color: #991b1b;
      word-break: break-word;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      font-size: 0.88rem;
    }

    .provisioning-receipt-warn {
      margin-top: 12px;
      padding: 10px 12px;
      background: #fffbeb;
      border: 1px solid #f59e0b;
      border-radius: 8px;
      color: #92400e;
      font-size: 0.88rem;
    }

    .provisioning-receipt-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 16px;
    }

    .receipt-copy-btn,
    .receipt-start-over-btn {
      background: #475569;
    }

    .receipt-copy-btn:hover,
    .receipt-start-over-btn:hover {
      background: #334155;
    }

    .provisioning-receipt-inner {
      border-width: 1px;
      border-radius: 4px;
    }

    @media (max-width: 960px) {
      .console-grid {
        grid-template-columns: 1fr;
      }
      .console-card-actions {
        position: static;
      }
    }

    @media (max-width: 600px) {
      .console-header {
        padding: 10px 12px;
      }
      .console-main {
        padding: 12px;
      }
      .search-form-row {
        flex-direction: column;
        align-items: stretch;
      }
      .search-form-row button {
        width: 100%;
        margin-bottom: 0;
      }
    }
  </style>
</head>
<body>
  <div class="console-page">
    <header class="console-header">
      <div class="console-header-left">
        <h1 data-i18n="app.title">PASS Provisioning Console</h1>
        <span class="env-badge" id="consoleEnvironment">PROD</span>
        <span id="headerCredentialStatus" class="header-credential-status" hidden></span>
      </div>
      <div class="console-header-right">
        <select id="languageSelector" class="lang-select" aria-label="Language">
          <option value="en">EN</option>
          <option value="es">ES</option>
        </select>
        <span class="header-user" id="headerUserLabel"></span>
        <button type="button" class="btn-ghost" id="consoleStartOverBtn">Start over</button>
        <button type="button" class="btn-ghost btn-logout" id="logoutBtn" data-i18n="buttons.logout">Logout</button>
      </div>
    </header>

    <main class="console-main" tabindex="-1">
      <div class="console-main-inner">
        <div class="console-grid">
          <div class="console-col console-col-left">
            <section id="clientSection" class="section console-card">
              <h2 data-i18n="installation.clientSelection">Installation search</h2>
              <form id="clientForm" class="search-form-row">
                <div class="field-group">
                  <label for="clientNameInput" data-i18n="installation.clientName">Client name or VIN prefix</label>
                  <input type="text" id="clientNameInput" placeholder="" autocomplete="off" />
                </div>
                <button type="submit">Search</button>
              </form>
              <p id="clientStatus" class="status-line"></p>
            </section>

            <section id="vinSection" class="section console-card">
              <h2 data-i18n="installation.vinSelection">Selected installation / vehicle</h2>
              <div id="selectedPersonName" class="selected-person"></div>
              <div class="field-group">
                <label for="vinSelect">VIN</label>
                <select id="vinSelect">
                  <option value="">— Select VIN —</option>
                </select>
              </div>
              <p id="vinStatus" class="status-line"></p>
            </section>

            <section id="deviceSection" class="section console-card">
              <h2>Device inventory</h2>

              <div class="device-panel device-panel-primary">
                <p class="device-panel-title">Primary device</p>
                <div class="field-group">
                  <label for="imeiInput" data-i18n="installation.imei">IMEI</label>
                  <input type="text" id="imeiInput" placeholder="IMEI — live lookup" autocomplete="off" />
                  <div id="imeiVerificationStatus" class="lookup-status" aria-live="polite"></div>
                </div>
                <div class="field-group">
                  <label for="imeiConfirmInput">Confirm IMEI</label>
                  <input type="text" id="imeiConfirmInput" placeholder="Retype IMEI" />
                </div>
                <div class="field-group">
                  <label for="simInput">SIM ICCID (optional)</label>
                  <input type="text" id="simInput" placeholder="8988 / 8901 prefix" autocomplete="off" />
                  <div id="simVerificationStatus" class="lookup-status" aria-live="polite"></div>
                </div>
                <div class="field-group">
                  <label for="simConfirmInput">Confirm SIM</label>
                  <input type="text" id="simConfirmInput" placeholder="Retype ICCID (optional)" />
                </div>
              </div>

              <div class="device-panel device-panel-secondary">
                <p class="device-panel-title">Secondary device (optional)</p>
                <div class="field-inline">
                  <label>
                    <input type="checkbox" id="addSecondaryUnit" />
                    Enable secondary unit
                  </label>
                </div>
                <div id="secondaryUnitFields" class="hidden">
                  <div class="field-group">
                    <label for="secondaryImeiInput">Secondary IMEI</label>
                    <input type="text" id="secondaryImeiInput" placeholder="IMEI — live lookup" autocomplete="off" />
                    <div id="secondaryImeiVerificationStatus" class="lookup-status" aria-live="polite"></div>
                  </div>
                  <div class="field-group">
                    <label for="secondarySimInput">Secondary SIM (optional)</label>
                    <input type="text" id="secondarySimInput" placeholder="ICCID" autocomplete="off" />
                    <div id="secondarySimVerificationStatus" class="lookup-status" aria-live="polite"></div>
                  </div>
                  <div class="field-group">
                    <label for="secondarySimConfirmInput">Confirm secondary SIM</label>
                    <input type="text" id="secondarySimConfirmInput" placeholder="Retype ICCID (optional)" />
                  </div>
                </div>
              </div>
            </section>
          </div>

          <div class="console-col console-col-right">
            <section class="section console-card console-card-actions">
              <h2>Provisioning preview</h2>
              <div id="provisioningPreviewPanel" class="provisioning-preview" aria-live="polite"></div>
              <div class="provision-actions">
                <button id="serverDryRunBtn" type="button" class="secondary-action">Validate plan (server dry-run)</button>
                <button id="startInstallBtn" type="button" disabled data-i18n="buttons.startInstallation">Provision in Pegasus</button>
              </div>
              <p id="serverDryRunStatus" class="status-line" aria-live="polite"></p>
              <div id="serverDryRunPanel" class="server-dry-run-panel hidden" aria-live="polite"></div>
              <p id="installStatus" class="status-line"></p>
            </section>

            <section class="section console-card console-card-receipt">
              <h2>Provisioning result</h2>
              <div id="provisioningReceiptPanel" class="provisioning-receipt hidden" aria-live="polite"></div>
            </section>
          </div>
        </div>
      </div>
    </main>
  </div>

  <!-- i18next Scripts -->
  <script src="./js/i18n-simple.js"></script>
  <script src="./js/activity-tracker.js"></script>
  <script src="./js/wizard-console-mode.js"></script>
  <script src="./js/wizard-auth.js"></script>
  <script src="./js/wizard-credential-status.js"></script>
  <script src="./js/wizard-api.js"></script>
  <script src="./js/wizard-provisioning-preview.js"></script>
