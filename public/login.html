<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Login — PASS Provisioning Console</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f1f5f9;
      color: #0f172a;
    }

    .login-card {
      width: 100%;
      max-width: 380px;
      margin: 24px;
      padding: 32px 28px;
      background: #fff;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
    }

    .login-header {
      text-align: center;
      margin-bottom: 24px;
    }

    .login-header h1 {
      margin: 0 0 8px 0;
      font-size: 1.25rem;
      font-weight: 600;
      line-height: 1.3;
    }

    .login-header p {
      margin: 0;
      font-size: 0.875rem;
      color: #64748b;
    }

    .env-badge {
      display: inline-block;
      margin-top: 12px;
      padding: 3px 10px;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      border-radius: 4px;
      border: 1px solid #cbd5e1;
      background: #f8fafc;
      color: #475569;
    }

    .env-badge.env-qa {
      border-color: #fcd34d;
      background: #fffbeb;
      color: #92400e;
    }

    .env-badge.env-prod {
      border-color: #c4b5fd;
      background: #f5f3ff;
      color: #5b21b6;
    }

    .env-badge.env-unknown {
      color: #64748b;
    }

    .login-error {
      display: none;
      margin-bottom: 16px;
      padding: 10px 12px;
      font-size: 0.875rem;
      color: #991b1b;
      background: #fef2f2;
      border: 1px solid #fecaca;
      border-radius: 6px;
    }

    .field {
      margin-bottom: 16px;
    }

    .field label {
      display: block;
      margin-bottom: 6px;
      font-size: 0.8125rem;
      font-weight: 500;
      color: #475569;
    }

    .field input {
      width: 100%;
      padding: 10px 12px;
      font-size: 1rem;
      border: 1px solid #cbd5e1;
      border-radius: 6px;
      background: #fff;
    }

    .field input:focus {
      outline: none;
      border-color: #64748b;
      box-shadow: 0 0 0 2px rgba(100, 116, 139, 0.2);
    }

    .login-btn {
      width: 100%;
      margin-top: 8px;
      padding: 11px 16px;
      font-size: 0.9375rem;
      font-weight: 600;
      color: #fff;
      background: #334155;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    .login-btn:hover:not(:disabled) {
      background: #1e293b;
    }

    .login-btn:disabled {
      opacity: 0.65;
      cursor: not-allowed;
    }
  </style>
</head>
<body>
  <main class="login-card">
    <header class="login-header">
      <h1>PASS Provisioning Console</h1>
      <p>Internal Pegasus provisioning access</p>
      <span id="envBadge" class="env-badge env-unknown" hidden>—</span>
    </header>

    <p id="loginError" class="login-error" role="alert"></p>

    <form id="loginForm">
      <div class="field">
        <label for="username">Username</label>
        <input
          type="text"
          id="username"
          name="username"
          required
          autocomplete="username"
          autofocus
        />
      </div>

      <div class="field">
        <label for="password">Password</label>
        <input
          type="password"
          id="password"
          name="password"
          required
          autocomplete="current-password"
        />
      </div>

      <button type="submit" class="login-btn" id="loginBtn">Sign in</button>
    </form>
  </main>

  <script>
    (function () {
      var envBadge = document.getElementById("envBadge");
      var loginForm = document.getElementById("loginForm");
      var loginBtn = document.getElementById("loginBtn");
      var loginError = document.getElementById("loginError");

      function showError(message) {
        loginError.textContent = message;
        loginError.style.display = "block";
      }

      function clearError() {
        loginError.textContent = "";
        loginError.style.display = "none";
      }

      function formatEnvLabel(raw) {
        if (!raw) return null;
        var v = String(raw).toLowerCase();
        if (v === "qa") return { label: "QA", className: "env-qa" };
        if (v === "production" || v === "prod") return { label: "PROD", className: "env-prod" };
        return { label: String(raw).toUpperCase(), className: "env-unknown" };
      }

      function setEnvironmentBadge(info) {
        if (!info || !info.label) {
          envBadge.hidden = true;
          return;
        }
        envBadge.textContent = info.label;
        envBadge.className = "env-badge " + info.className;
        envBadge.hidden = false;
      }

      fetch("/healthz", { cache: "no-store" })
        .then(function (res) {
          return res.ok ? res.json() : null;
        })
        .then(function (data) {
          setEnvironmentBadge(formatEnvLabel(data && data.environment));
        })
        .catch(function () {
          envBadge.hidden = true;
        });

      var token = localStorage.getItem("authToken");
      if (token) {
        fetch("/api/auth/me", {
          headers: { Authorization: "Bearer " + token },
        })
          .then(function (res) {
            if (res.ok) {
              window.location.replace("/");
            } else {
              localStorage.removeItem("authToken");
              localStorage.removeItem("userInfo");
            }
          })
          .catch(function () {
            localStorage.removeItem("authToken");
            localStorage.removeItem("userInfo");
          });
      }

      loginForm.addEventListener("submit", function (e) {
        e.preventDefault();
        clearError();

        var username = document.getElementById("username").value.trim();
        var password = document.getElementById("password").value;

        loginBtn.disabled = true;
        loginBtn.textContent = "Signing in…";

        fetch("/api/auth/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ username: username, password: password }),
        })
          .then(function (res) {
            return res.json().then(function (data) {
              return { ok: res.ok, data: data };
            });
          })
          .then(function (result) {
            if (result.ok && result.data && result.data.success && result.data.token) {
              localStorage.setItem("authToken", result.data.token);
              if (result.data.user) {
                localStorage.setItem("userInfo", JSON.stringify(result.data.user));
              }
              window.location.replace("/");
              return;
            }
            showError(
              (result.data && result.data.message) || "Sign in failed. Check your credentials."
            );
          })
          .catch(function () {
            showError("Could not reach the server. Try again.");
          })
          .finally(function () {
            loginBtn.disabled = false;
            loginBtn.textContent = "Sign in";
          });
      });
    })();
  </script>
</body>
</html>
